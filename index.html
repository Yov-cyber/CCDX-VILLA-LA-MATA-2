<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Sonografías</title>
    
    <!-- Precargar imágenes críticas para carga inmediata -->
    <link rel="preload" href="fondo.jpg" as="image" type="image/jpeg">
    <link rel="preload" href="Avatar.png" as="image" type="image/png">
    
    <!-- Precargar fuente crítica -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        /* Asegurar que las imágenes se carguen correctamente */
        body {
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: url('fondo.jpg'), linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover, cover;
            background-position: center, center;
            background-attachment: fixed, fixed;
            background-repeat: no-repeat, no-repeat;
            min-height: 100vh;
            color: #333;
            position: relative;
            /* Evitar el parpadeo inicial */
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        
        /* Mostrar el body cuando las imágenes estén cargadas */
        body.loaded {
            opacity: 1;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="%23ffffff" opacity="0.1"/><circle cx="75" cy="75" r="1" fill="%23ffffff" opacity="0.1"/><circle cx="50" cy="10" r="1" fill="%23ffffff" opacity="0.05"/><circle cx="10" cy="90" r="1" fill="%23ffffff" opacity="0.05"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.15), 
                0 0 0 1px rgba(255, 255, 255, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 123, 255, 0.05) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #007BFF, #0056b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.8em;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }
        
        h2 {
            text-align: center;
            color: #4a5568;
            font-size: 1.4em;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 20px;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }
        form {
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .form-group {
            position: relative;
        }
        
        label {
            display: block;
            margin: 0 0 8px 0;
            color: #2d3748;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
        }
        
        label::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 30px;
            height: 2px;
            background: linear-gradient(90deg, #007BFF, #667eea);
            border-radius: 1px;
        }
        
        input, select {
            padding: 15px 20px;
            margin: 5px 0;
            width: 100%;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
        }
        
        input:focus, select:focus {
            border-color: #007BFF;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 1);
        }
        
        select {
            cursor: pointer;
            appearance: none;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23007BFF"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 20px;
            padding-right: 50px;
        }
        
        button {
            padding: 18px 40px;
            background: linear-gradient(135deg, #007BFF, #0056b3);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 8px 20px rgba(0, 123, 255, 0.4),
                0 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        button:hover {
            background: linear-gradient(135deg, #0056b3, #003d82);
            transform: translateY(-3px);
            box-shadow: 
                0 15px 30px rgba(0, 123, 255, 0.5),
                0 8px 16px rgba(0, 0, 0, 0.15);
        }
        
        button:hover::before {
            left: 100%;
        }
        
        button:active {
            transform: translateY(0);
        }
        .result {
            margin-top: 30px;
            padding: 25px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(247, 250, 252, 0.95));
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.12), 
                inset 0 1px 0 rgba(255, 255, 255, 0.7),
                0 0 0 1px rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 1;
        }
        
        .result h2 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 1.8em;
            text-align: center;
            font-weight: 700;
        }
        
        .result h3 {
            color: #007BFF;
            margin: 20px 0 15px 0;
            font-size: 1.3em;
            font-weight: 600;
            padding: 10px;
            background: linear-gradient(135deg, rgba(0, 123, 255, 0.1), rgba(102, 126, 234, 0.1));
            border-radius: 8px;
            border-left: 4px solid #007BFF;
        }
        
        .result strong {
            color: #007BFF;
            font-weight: 700;
            font-size: 1.1em;
        }
        
        .avatar {
            position: fixed;
            bottom: 0px;
            left: -90px;
            width: 420px;
            height: 480px;
            background-image: url('Avatar.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            filter: drop-shadow(0 0 0 3px white);
            /* Asegurar que la imagen se cargue inmediatamente */
            will-change: transform;
        }

        
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8em;
            font-weight: 900;
            color: rgba(0, 123, 255, 0.05);
            pointer-events: none;
            user-select: none;
            z-index: 0;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 3px;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            font-weight: 400;
            position: relative;
            z-index: 1;
        }
        
        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                padding: 20px;
            }
            
            h1 {
                font-size: 2.2em;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .watermark {
                font-size: 5em;
            }
            
            .avatar {
                width: 300px;
                height: 360px;
                bottom: 0px;
                left: 0px;
                filter: drop-shadow(0 0 0 2px white);
                /* Asegurar que la imagen se cargue en móviles */
                will-change: transform;
                background-image: url('Avatar.png');
            }
        }
        
        /* Animaciones de entrada */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .avatar {
            animation: slideInRight 0.8s ease-out;
        }
        
        .container {
            animation: fadeInUp 0.8s ease-out;
        }
        
        .form-group {
            animation: fadeInUp 0.6s ease-out backwards;
        }
        
        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }

        /* Estilos para modales personalizados */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: none;
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal h3 {
            margin: 0 0 20px 0;
            color: #2d3748;
            font-size: 1.5em;
            text-align: center;
            font-weight: 600;
        }

        .modal p {
            margin: 0 0 25px 0;
            color: #4a5568;
            text-align: center;
            line-height: 1.6;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            width: auto;
            min-width: 100px;
        }

        .modal-button.primary {
            background: linear-gradient(135deg, #007BFF, #0056b3);
            color: white;
        }

        .modal-button.danger {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
        }

        .modal-button.secondary {
            background: linear-gradient(135deg, #6c757d, #5a6268);
            color: white;
        }

        .modal-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .modal-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .modal-input:focus {
            border-color: #007BFF;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .modal-list {
            max-height: 200px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .modal-list-item {
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
            color: #2d3748;
        }

        .modal-list-item:last-child {
            border-bottom: none;
        }
        
        /* Loader para carga inicial */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            opacity: 1;
            transition: opacity 0.5s ease-out;
        }
        
        .page-loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader-content {
            text-align: center;
            color: white;
        }
        
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Mejoras adicionales */
        
        /* Estadísticas mejoradas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(0, 123, 255, 0.1), rgba(102, 126, 234, 0.05));
            border: 2px solid rgba(0, 123, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 123, 255, 0.2);
            border-color: rgba(0, 123, 255, 0.4);
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: #007BFF;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0, 123, 255, 0.3);
        }
        
        .stat-label {
            font-size: 0.9em;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        /* Notificaciones toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(40, 167, 69, 0.95);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 10001;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.error {
            background: rgba(220, 53, 69, 0.95);
        }
        
        .toast.warning {
            background: rgba(255, 193, 7, 0.95);
            color: #333;
        }
        
        /* Animación de entrada mejorada */
        .container {
            animation: fadeInUp 0.8s ease-out, glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            0% { box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15); }
            100% { box-shadow: 0 25px 50px rgba(0, 123, 255, 0.1); }
        }
        
        /* Responsive mejorado */
        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .stat-number {
                font-size: 2em;
            }
        }

        /* Botones de eliminación */
        .delete-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .delete-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            width: auto;
            min-width: 180px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .delete-all {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
        }

        .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .delete-all:hover {
            background: linear-gradient(135deg, #c82333, #a71e2a);
        }

        @media (max-width: 768px) {
            .delete-controls {
                flex-direction: column;
                align-items: center;
            }
            
            .delete-btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>

<script>
    // Precargar imágenes críticas para evitar parpadeos
    function preloadImages() {
        const images = ['fondo.jpg', 'Avatar.png'];
        let loadedImages = 0;
        
        images.forEach(src => {
            const img = new Image();
            img.onload = () => {
                loadedImages++;
                if (loadedImages === images.length) {
                    showContent();
                }
            };
            img.onerror = () => {
                loadedImages++;
                console.warn(`Error cargando imagen: ${src}`);
                if (loadedImages === images.length) {
                    showContent();
                }
            };
            img.src = src;
        });
    }
    
    function showContent() {
        const loader = document.getElementById('page-loader');
        setTimeout(() => {
            document.body.classList.add('loaded');
            loader.classList.add('hidden');
            // Remover el loader del DOM después de la animación
            setTimeout(() => {
                if (loader && loader.parentNode) {
                    loader.parentNode.removeChild(loader);
                }
            }, 500);
        }, 300);
    }

    // Inicializar precarga al cargar el DOM
    document.addEventListener('DOMContentLoaded', preloadImages);
    
    // Fallback: mostrar contenido después de 3 segundos máximo
    setTimeout(() => {
        showContent();
    }, 3000);

    // Variables globales
    let temaOscuro = localStorage.getItem('temaOscuro') === 'true';

    // Función para mostrar notificaciones toast
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type} show`;
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    // Funciones para modales personalizados
    function showModal(title, message, buttons) {
        return new Promise((resolve) => {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            
            let buttonsHTML = '';
            buttons.forEach(button => {
                buttonsHTML += `<button class="modal-button ${button.class}" onclick="closeModal('${button.value}')">${button.text}</button>`;
            });
            
            content.innerHTML = `
                <h3>${title}</h3>
                <p>${message}</p>
                <div class="modal-buttons">
                    ${buttonsHTML}
                </div>
            `;
            
            overlay.style.display = 'flex';
            
            window.modalResolve = resolve;
        });
    }

    function showPromptModal(title, message, options = []) {
        return new Promise((resolve) => {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            
            let optionsHTML = '';
            if (options.length > 0) {
                optionsHTML = `
                    <div class="modal-list">
                        ${options.map((opt, i) => `<div class="modal-list-item">${i + 1}. ${opt}</div>`).join('')}
                    </div>
                `;
            }
            
            content.innerHTML = `
                <h3>${title}</h3>
                <p>${message}</p>
                ${optionsHTML}
                <input type="text" class="modal-input" id="modal-input" placeholder="Escriba su respuesta...">
                <div class="modal-buttons">
                    <button class="modal-button primary" onclick="submitPrompt()">Aceptar</button>
                    <button class="modal-button secondary" onclick="closeModal(null)">Cancelar</button>
                </div>
            `;
            
            overlay.style.display = 'flex';
            setTimeout(() => document.getElementById('modal-input').focus(), 100);
            
            window.modalResolve = resolve;
        });
    }

    function submitPrompt() {
        const input = document.getElementById('modal-input');
        const value = input.value.trim();
        closeModal(value || null);
    }

    function closeModal(result) {
        const overlay = document.getElementById('modal-overlay');
        overlay.style.display = 'none';
        
        if (window.modalResolve) {
            window.modalResolve(result);
            window.modalResolve = null;
        }
    }

    // Cerrar modal al hacer clic fuera de él
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal(null);
        }
    });

    // Cargar datos del localStorage al iniciar
    let sonografias = JSON.parse(localStorage.getItem('sonografias')) || [];

    // Mostrar resultados al cargar la página si hay datos
    if (sonografias.length > 0) {
        mostrarResultados();
    }

    // Función para guardar datos en localStorage
    function guardarDatos() {
        localStorage.setItem('sonografias', JSON.stringify(sonografias));
    }

    document.getElementById('tipo').addEventListener('change', function() {
        const tipo = this.value;
        const sexo = document.getElementById('sexo');

        // Asignar automáticamente "Masculino" para la sonografía Prostática
        if (tipo === "Prostática") {
            sexo.value = "Masculino";
        } else if (["Obstétrica", "Sonomamografía", "Transvaginal"].includes(tipo)) {
            sexo.value = "Femenina";
        } else {
            sexo.value = ""; // Restablecer la selección si no es uno de los tipos especificados
        }
    });

    document.getElementById('seguro').addEventListener('change', function() {
        const seguro = this.value;
        const nacionalidad = document.getElementById('nacionalidad');

        // Asignar automáticamente "Dominicano" cuando tiene seguro
        if (seguro === "Sí") {
            nacionalidad.value = "Dominicano";
        } else {
            nacionalidad.value = ""; // Restablecer la selección si no tiene seguro
        }
    });

    document.getElementById('sonografia-form').addEventListener('submit', async function(event) {
        event.preventDefault();

        const tipo = document.getElementById('tipo');
        const sexo = document.getElementById('sexo');
        const seguro = document.getElementById('seguro');
        const nacionalidad = document.getElementById('nacionalidad');

        // Validar que todos los campos estén llenos
        if (!tipo.value || !sexo.value || !seguro.value || !nacionalidad.value) {
            await showModal('Campos Incompletos', 'Complete todos los campos obligatorios antes de continuar.', [
                { text: 'Entendido', class: 'primary', value: 'ok' }
            ]);
            return;
        }

        // Agregar timestamp para identificar cuándo se agregó
        const nuevaSonografia = {
            tipo: tipo.value,
            sexo: sexo.value,
            seguro: seguro.value,
            nacionalidad: nacionalidad.value,
            fecha: new Date().toISOString()
        };

        sonografias.push(nuevaSonografia);
        guardarDatos(); // Guardar en localStorage
        mostrarResultados();
        this.reset();
        
        showToast('Sonografía agregada exitosamente', 'success');
    });

    function mostrarResultados() {
        const datos = sonografias;
        
        const conteo = {
            Tiroides: { Femenina: 0, Masculino: 0, Dominicano: 0, Haitiano: 0, Extranjero: 0, ConSeguro: 0, SinSeguro: 0 },
            Abdominal: { Femenina: 0, Masculino: 0, Dominicano: 0, Haitiano: 0, Extranjero: 0, ConSeguro: 0, SinSeguro: 0 },
            Obstétrica: { Femenina: 0, Masculino: 0, Dominicano: 0, Haitiano: 0, Extranjero: 0, ConSeguro: 0, SinSeguro: 0 },
            Prostática: { Femenina: 0, Masculino: 0, Dominicano: 0, Haitiano: 0, Extranjero: 0, ConSeguro: 0, SinSeguro: 0 },
            Sonomamografía: { Femenina: 0, Masculino: 0, Dominicano: 0, Haitiano: 0, Extranjero: 0, ConSeguro: 0, SinSeguro: 0 },
            Transvaginal: { Femenina: 0, Masculino: 0, Dominicano: 0, Haitiano: 0, Extranjero: 0, ConSeguro: 0, SinSeguro: 0 },
            Pélvica: { Femenina: 0, Masculino: 0, Dominicano: 0, Haitiano: 0, Extranjero: 0, ConSeguro: 0, SinSeguro: 0 },
            "Partes blandas": { Femenina: 0, Masculino: 0, Dominicano: 0, Haitiano: 0, Extranjero: 0, ConSeguro: 0, SinSeguro: 0 },
            Escrotal: { Femenina: 0, Masculino: 0, Dominicano: 0, Haitiano: 0, Extranjero: 0, ConSeguro: 0, SinSeguro: 0 },
            "Doppler alterial": { Femenina: 0, Masculino: 0, Dominicano: 0, Haitiano: 0, Extranjero: 0, ConSeguro: 0, SinSeguro: 0 },
            "Doppler venoso": { Femenina: 0, Masculino: 0, Dominicano: 0, Haitiano: 0, Extranjero: 0, ConSeguro: 0, SinSeguro: 0 },
        };

        datos.forEach(sonografia => {
            if (conteo[sonografia.tipo]) {
                conteo[sonografia.tipo][sonografia.sexo]++;
                conteo[sonografia.tipo][sonografia.nacionalidad]++;
                if (sonografia.seguro === "Sí") {
                    conteo[sonografia.tipo].ConSeguro++;
                } else {
                    conteo[sonografia.tipo].SinSeguro++;
                }
            }
        });

        // Calcular estadísticas generales
        const stats = {
            sexo: { Femenina: 0, Masculino: 0 },
            seguro: { 'Sí': 0, 'No': 0 },
            nacionalidad: { Dominicano: 0, Haitiano: 0, Extranjero: 0 }
        };

        datos.forEach(sonografia => {
            stats.sexo[sonografia.sexo] = (stats.sexo[sonografia.sexo] || 0) + 1;
            stats.seguro[sonografia.seguro] = (stats.seguro[sonografia.seguro] || 0) + 1;
            stats.nacionalidad[sonografia.nacionalidad] = (stats.nacionalidad[sonografia.nacionalidad] || 0) + 1;
        });
        
        let resultadosHTML = '<h2>Resultados</h2>';
        
        // Mostrar estadísticas generales
        const totalRegistros = datos.length;
        resultadosHTML += `<p style="text-align: center; font-weight: 600; color: #007BFF; margin-bottom: 20px;">
            Total de registros: <strong>${totalRegistros}</strong>
        </p>`;
        
        // Tarjetas de estadísticas
        if (totalRegistros > 0) {
            resultadosHTML += `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${stats.sexo.Femenina || 0}</div>
                        <div class="stat-label">Femenino</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.sexo.Masculino || 0}</div>
                        <div class="stat-label">Masculino</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.seguro.Sí || 0}</div>
                        <div class="stat-label">Con Seguro</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.seguro.No || 0}</div>
                        <div class="stat-label">Sin Seguro</div>
                    </div>
                </div>
            `;
        }
        
        // Detalles por tipo
        for (const tipo in conteo) {
            const totalTipo = conteo[tipo].Femenina + conteo[tipo].Masculino;
            if (totalTipo > 0) {
                resultadosHTML += `<h3>${tipo}</h3>`;
                resultadosHTML += `Femeninas: <strong>${conteo[tipo].Femenina}</strong> <br>`;
                resultadosHTML += `Masculinos: <strong>${conteo[tipo].Masculino}</strong> <br>`;
                resultadosHTML += `Con Seguro: <strong>${conteo[tipo].ConSeguro}</strong> <br>`;
                resultadosHTML += `Sin Seguro: <strong>${conteo[tipo].SinSeguro}</strong> <br>`;
                resultadosHTML += `Dominicanos: <strong>${conteo[tipo].Dominicano}</strong> <br>`;
                resultadosHTML += `Haitianos: <strong>${conteo[tipo].Haitiano}</strong> <br>`;
                resultadosHTML += `Extranjero: <strong>${conteo[tipo].Extranjero}</strong> <br>`;
            }
        }

        if (totalRegistros === 0) {
            resultadosHTML = '<h2>Resultados</h2><p style="text-align: center; color: #666;">No hay datos registrados.</p>';
        }

        // Reemplazar "undefined" con 0
        resultadosHTML = resultadosHTML.replace(/undefined/g, "0");

        document.getElementById('resultados').innerHTML = resultadosHTML;
    }

    // Funciones de eliminación de datos
    async function eliminarTodosLosDatos() {
        const totalRegistros = sonografias.length;
        if (totalRegistros === 0) {
            await showModal('Sin Datos', 'No hay registros para eliminar.', [
                { text: 'Entendido', class: 'primary', value: 'ok' }
            ]);
            return;
        }

        const confirmacion = await showModal('Confirmar Eliminación', 
            `¿Estás seguro de que quieres eliminar TODOS los ${totalRegistros} registro(s)? Esta acción no se puede deshacer.`, 
            [
                { text: 'Cancelar', class: 'secondary', value: 'cancelar' },
                { text: 'Eliminar Todo', class: 'danger', value: 'confirmar' }
            ]
        );

        if (confirmacion === 'confirmar') {
            const registrosEliminados = sonografias.length;
            sonografias = [];
            guardarDatos(); // Usar la función consistente para guardar
            mostrarResultados();
            showToast(`${registrosEliminados} registro(s) eliminado(s)`, 'success');
        }
    }
</script>

</body>
